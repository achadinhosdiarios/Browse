<!DOCTYPE html>
<html lang="pt-BR" data-view="home">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Achadinhos Diários</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=Poppins:wght@500;600;700;800&display=swap"
    rel="stylesheet">
  <style>
    /* ── RESET & VARIÁVEIS BASE ── */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #FCFAF7;
      --surface: rgba(255, 255, 255, 0.7);
      --surface-solid: #FFFFFF;
      --surface-2: #F7F2E9;
      --text: #2C1E16;
      --text-mid: #6D5A4D;
      --text-muted: #AFA197;
      --accent: #D48D5E;
      --accent-2: #EBC7A1;
      --accent-grad: linear-gradient(135deg, #EBC7A1 0%, #D48D5E 100%);
      --accent-light: rgba(212, 141, 94, 0.1);
      --border: rgba(44, 30, 22, 0.08);
      --border-glass: rgba(255, 255, 255, 0.4);
      --radius-sm: 14px;
      --radius-md: 22px;
      --radius-lg: 30px;
      --radius-pill: 999px;
      --shadow-sm: 0 4px 16px rgba(44, 30, 22, 0.03);
      --shadow-md: 0 12px 28px rgba(44, 30, 22, 0.06);
      --shadow-lg: 0 24px 50px rgba(44, 30, 22, 0.1);
      --shadow-acc: 0 12px 24px rgba(212, 141, 94, 0.25);
      --spring: cubic-bezier(.16, 1, .3, 1);
      --easing: cubic-bezier(.25, .8, .25, 1);
    }

    [data-theme="dark"] {
      --bg: #120E0A;
      --surface: rgba(30, 26, 22, 0.6);
      --surface-solid: #1E1A16;
      --surface-2: #2C2621;
      --text: #F7F2E9;
      --text-mid: #EBC7A1;
      --text-muted: #AFA197;
      --accent: #D48D5E;
      --accent-2: #EBC7A1;
      --accent-grad: linear-gradient(135deg, #EBC7A1 0%, #D48D5E 100%);
      --accent-light: rgba(212, 141, 94, 0.15);
      --border: rgba(247, 242, 233, 0.08);
      --border-glass: rgba(255, 255, 255, 0.03);
      --shadow-sm: 0 4px 16px rgba(0, 0, 0, 0.4);
      --shadow-md: 0 12px 28px rgba(0, 0, 0, 0.5);
      --shadow-lg: 0 24px 50px rgba(0, 0, 0, 0.6);
      --shadow-acc: 0 12px 24px rgba(212, 141, 94, 0.2);
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
      padding-bottom: 100px;
      -webkit-tap-highlight-color: transparent;
    }

    /* ── SCROLLBAR OVERLAY ── */
    html {
      scrollbar-width: thin;
      scrollbar-color: rgba(44, 30, 22, 0.2) transparent;
    }

    [data-theme="dark"] html {
      scrollbar-color: rgba(247, 242, 233, 0.15) transparent;
    }

    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: rgba(44, 30, 22, 0.15);
      border-radius: var(--radius-pill);
      border: 1px solid transparent;
      background-clip: padding-box;
    }

    [data-theme="dark"] ::-webkit-scrollbar-thumb {
      background: rgba(247, 242, 233, 0.15);
    }

    ::-webkit-scrollbar-thumb:hover {
      background: var(--text-muted);
    }

    body::before {
      content: '';
      position: fixed;
      width: 70vw;
      height: 70vw;
      border-radius: 50%;
      filter: blur(150px);
      z-index: -1;
      opacity: 0.25;
      pointer-events: none;
      background: radial-gradient(circle, var(--accent-light) 0%, transparent 70%);
      top: -20%;
      left: -10%;
    }

    *,
    *::before,
    *::after {
      transition: background-color .3s var(--easing), border-color .3s var(--easing), color .3s var(--easing);
    }

    /* ── HEADER ── */
    .site-header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(var(--bg), 0.7);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-bottom: 1px solid var(--border);
    }

    .header-inner {
      max-width: 1240px;
      margin: 0 auto;
      padding: 0 1.5rem;
      height: 68px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      text-decoration: none;
    }

    .logo-img {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      object-fit: cover;
      box-shadow: 0 0 0 2px var(--accent);
    }

    .logo-text {
      font-family: 'Poppins', sans-serif;
      font-size: 1.15rem;
      font-weight: 800;
      color: var(--text);
      letter-spacing: -0.5px;
    }

    .logo-text em {
      color: var(--accent);
      font-style: normal;
    }

    .theme-toggle {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: var(--surface-2);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all .3s var(--spring);
      font-size: 1.1rem;
    }

    .theme-toggle:hover {
      background: var(--accent-light);
      border-color: var(--accent);
      transform: scale(1.05);
    }

    /* ── SISTEMA DE ABAS ── */
    .tab-view {
      display: none;
      max-width: 1240px;
      margin: 0 auto;
      padding: 1.5rem;
      opacity: 0;
    }

    .tab-view.active {
      display: block;
      animation: smoothSlideRight 0.5s var(--spring) both;
    }

    .tab-view.slide-right {
      animation: smoothSlideRight 0.5s var(--spring) both;
    }

    .tab-view.slide-left {
      animation: smoothSlideLeft 0.5s var(--spring) both;
    }

    @keyframes smoothSlideRight {
      from {
        opacity: 0;
        transform: translateX(30px) scale(0.98);
      }

      to {
        opacity: 1;
        transform: translateX(0) scale(1);
      }
    }

    @keyframes smoothSlideLeft {
      from {
        opacity: 0;
        transform: translateX(-30px) scale(0.98);
      }

      to {
        opacity: 1;
        transform: translateX(0) scale(1);
      }
    }

    /* ── CÁPSULA DO HERÓI (INÍCIO) ── */
    .hero-panel {
      text-align: center;
      max-width: 640px;
      margin: 2rem auto;
    }

    .capsule-text-wrap {
      background: var(--surface-solid);
      border-radius: var(--radius-lg);
      padding: 3rem 2.5rem;
      box-shadow: var(--shadow-sm);
      border: 1px solid var(--border);
      position: relative;
    }

    .capsule-text-wrap::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      box-shadow: inset 0 2px 2px rgba(255, 255, 255, 0.2);
      pointer-events: none;
    }

    .hero-panel h1 {
      font-family: 'Poppins', sans-serif;
      font-size: clamp(2rem, 5vw, 2.6rem);
      font-weight: 800;
      letter-spacing: -1px;
      margin-bottom: 1.2rem;
      line-height: 1.15;
      color: var(--text);
    }

    .hero-panel h1 span {
      background: var(--accent-grad);
      background-clip: text;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .hero-panel p {
      color: var(--text-mid);
      font-size: 1.05rem;
      line-height: 1.6;
      max-width: 480px;
      margin: 0 auto;
      font-weight: 500;
    }

    /* ── EXPLORAR (FILTROS) ── */
    .explorer-header {
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
      margin-bottom: 2rem;
    }

    .filter-scroll-wrap {
      margin: 0 -1.5rem;
      padding: 0 1.5rem;
      overflow-x: auto;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
    }

    .filter-scroll-wrap::-webkit-scrollbar {
      display: none;
    }

    .filter-bar {
      display: flex;
      gap: 10px;
      padding-bottom: 8px;
    }

    .pill {
      padding: 14px 24px;
      border-radius: var(--radius-pill);
      border: 1px solid var(--border);
      background: var(--surface-solid);
      font-size: .95rem;
      font-weight: 700;
      color: var(--text-mid);
      cursor: pointer;
      white-space: nowrap;
      transition: all .3s var(--spring);
      box-shadow: var(--shadow-sm);
    }

    .pill:hover {
      border-color: var(--accent-light);
      transform: translateY(-2px);
    }

    .pill.active {
      background: var(--accent-grad);
      border-color: transparent;
      color: #fff;
      box-shadow: var(--shadow-acc);
      transform: translateY(-2px);
    }

    .sort-container {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      background: var(--surface-2);
      padding: 12px 16px;
      border-radius: var(--radius-md);
      border: 1px solid var(--border);
    }

    .sort-label {
      font-size: .75rem;
      font-weight: 800;
      text-transform: uppercase;
      color: var(--text-muted);
      letter-spacing: 1px;
    }

    .sort-chips {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .sort-chip {
      padding: 8px 16px;
      background: transparent;
      border: 1px solid transparent;
      border-radius: var(--radius-pill);
      font-size: .85rem;
      font-weight: 700;
      color: var(--text-mid);
      cursor: pointer;
      transition: all .2s;
    }

    .sort-chip:hover {
      background: rgba(44, 30, 22, 0.05);
    }

    .sort-chip.active {
      background: var(--surface-solid);
      color: var(--text);
      box-shadow: var(--shadow-sm);
      border-color: var(--border);
    }

    /* ── PESQUISADOR ── */
    .search-hero {
      max-width: 600px;
      margin: 2rem auto;
    }

    .search-wrapper {
      position: relative;
      display: flex;
      align-items: center;
      width: 100%;
    }

    .search-wrapper input {
      width: 100%;
      height: 64px;
      padding: 0 64px 0 54px;
      background: var(--surface-solid);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      font-size: 1.15rem;
      font-weight: 500;
      color: var(--text);
      box-shadow: var(--shadow-sm);
      transition: all .3s var(--spring);
    }

    .search-wrapper input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 4px var(--accent-light), var(--shadow-md);
      transform: translateY(-2px);
    }

    .search-icon {
      position: absolute;
      left: 20px;
      font-size: 1.3rem;
      color: var(--text-muted);
      pointer-events: none;
    }

    .search-clear {
      position: absolute;
      right: 16px;
      background: var(--surface-2);
      border: none;
      border-radius: 50%;
      width: 34px;
      height: 34px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      opacity: 0;
      pointer-events: none;
      transition: all .2s;
      color: var(--text);
      font-size: .9rem;
    }

    .search-clear.visible {
      opacity: 1;
      pointer-events: all;
    }

    .search-results-info {
      margin-top: 1.5rem;
      font-size: .95rem;
      color: var(--text-muted);
      font-weight: 600;
      text-align: center;
    }

    .search-results-info span {
      color: var(--text);
      background: var(--surface-2);
      padding: 4px 10px;
      border-radius: var(--radius-pill);
    }

    /* ── GRID DE PRODUTOS ── */
    .grid-section {
      max-width: 1240px;
      margin: 0 auto;
      padding: 0 1.5rem 2rem;
    }

    .product-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 1.5rem;
    }

    @media (max-width: 600px) {
      .product-grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 1rem;
      }

      .grid-section {
        padding: 0 1rem 1.5rem;
      }
    }

    /* Cards */
    .card {
      background: var(--surface);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border-radius: var(--radius-md);
      padding: 10px;
      display: flex;
      flex-direction: column;
      position: relative;
      box-shadow: var(--shadow-sm);
      border: 1px solid var(--border-glass);
      cursor: pointer;
      transition: transform .4s var(--spring), box-shadow .4s var(--spring), border-color 0.3s;
    }

    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.15);
      pointer-events: none;
      z-index: 10;
    }

    .card:hover {
      transform: translateY(-6px);
      box-shadow: var(--shadow-lg);
      border-color: var(--accent-light);
    }

    .card:active {
      transform: scale(0.98);
    }

    .card-img {
      position: relative;
      aspect-ratio: 1/1;
      border-radius: var(--radius-sm);
      overflow: hidden;
      background: var(--surface-2);
    }

    .card-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .card:hover .card-img img {
      transform: scale(1.08);
      transition: transform .6s var(--easing);
    }

    .cat-tag {
      position: absolute;
      top: 10px;
      left: 10px;
      padding: 6px 12px;
      background: rgba(var(--surface-solid), 0.9);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border-radius: var(--radius-pill);
      font-size: .65rem;
      font-weight: 800;
      color: var(--text);
      text-transform: uppercase;
      box-shadow: var(--shadow-sm);
      z-index: 2;
    }

    .img-hint {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(var(--text), 0.4) 0%, transparent 50%);
      display: flex;
      align-items: flex-end;
      padding: 12px;
      opacity: 0;
      transition: opacity 0.3s;
      z-index: 1;
    }

    .card:hover .img-hint {
      opacity: 1;
    }

    .img-hint span {
      font-size: .75rem;
      font-weight: 700;
      color: var(--bg);
      background: rgba(var(--bg), 0.2);
      backdrop-filter: blur(6px);
      padding: 6px 14px;
      border-radius: var(--radius-pill);
      border: 1px solid rgba(var(--bg), 0.3);
    }

    .card-body {
      padding: 1.2rem 0.2rem 0.2rem;
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .card-title {
      font-family: 'Poppins', sans-serif;
      font-size: .95rem;
      font-weight: 600;
      line-height: 1.4;
      color: var(--text);
      margin-bottom: .6rem;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .card-price {
      font-size: 1.4rem;
      font-weight: 800;
      color: var(--accent);
      margin-bottom: 1.2rem;
      letter-spacing: -0.5px;
    }

    .btn-buy {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 14px;
      background: var(--surface-2);
      color: var(--text);
      text-decoration: none;
      font-size: .95rem;
      font-weight: 700;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      transition: all .3s var(--spring);
    }

    .card:hover .btn-buy {
      background: var(--accent-grad);
      color: #fff;
      border-color: transparent;
      box-shadow: var(--shadow-acc);
    }

    /* ── BARRA DE NAVEGAÇÃO INFERIOR REDUZIDA & COMPACTA ── */
    .bottom-nav {
      position: fixed;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(var(--surface-solid), 0.85);
      backdrop-filter: blur(34px);
      -webkit-backdrop-filter: blur(34px);
      border: 1px solid var(--border);
      border-radius: var(--radius-pill);
      padding: 4px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: var(--shadow-lg);
      z-index: 1500;
      width: calc(100% - 2rem);
      max-width: 360px;
      /* Reduzido de 440px para 360px */
    }

    .nav-indicator {
      position: absolute;
      top: 4px;
      bottom: 4px;
      left: 0;
      background: var(--accent-grad);
      border-radius: var(--radius-pill);
      transition: transform 0.4s var(--spring), width 0.4s var(--spring);
      z-index: 0;
      box-shadow: var(--shadow-acc);
    }

    .nav-item {
      background: transparent;
      border: none;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
      padding: 8px 0;
      border-radius: var(--radius-pill);
      color: var(--text-muted);
      font-family: inherit;
      font-weight: 700;
      font-size: .7rem;
      /* Reduzido de .75rem */
      transition: color 0.3s var(--spring);
      flex: 1;
      position: relative;
      z-index: 1;
      -webkit-tap-highlight-color: transparent;
    }

    .nav-item:hover {
      color: var(--text);
    }

    .nav-item.active {
      color: #fff;
    }

    .nav-item .icon {
      font-size: 1.1rem;
      transition: transform 0.4s var(--spring);
    }

    /* Reduzido de 1.3rem */
    .nav-item.active .icon {
      transform: translateY(-1px) scale(1.08);
    }

    /* ── PREMIUM FOOTER INTEGRADO ── */
    footer {
      background: var(--surface-solid);
      border-top: 1px solid var(--border);
      padding: 2.5rem 1.5rem;
      margin-top: 4rem;
      border-radius: var(--radius-lg) var(--radius-lg) 0 0;
    }

    .footer-inner {
      max-width: 1240px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1.5rem;
      flex-wrap: wrap;
    }

    .footer-logo {
      font-family: 'Poppins', sans-serif;
      font-size: 1.05rem;
      font-weight: 800;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .footer-logo img {
      height: 32px;
      width: 32px;
      border-radius: 50%;
      object-fit: cover;
    }

    .btn-social {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 10px 20px;
      background: var(--surface-2);
      color: var(--text);
      text-decoration: none;
      font-size: 0.85rem;
      font-weight: 700;
      border-radius: var(--radius-pill);
      border: 1px solid var(--border);
      transition: all .2s;
    }

    .btn-social:hover {
      background: var(--accent-grad);
      color: #fff;
      border-color: transparent;
      box-shadow: var(--shadow-acc);
      transform: translateY(-2px);
    }

    .footer-copy {
      font-size: .85rem;
      color: var(--text-muted);
      font-weight: 500;
    }

    @media (max-width: 768px) {
      .footer-inner {
        flex-direction: column;
        text-align: center;
        justify-content: center;
        gap: 1rem;
      }
    }

    /* ── MODAL ── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      z-index: 2000;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      opacity: 0;
      pointer-events: none;
      transition: opacity .4s var(--easing);
    }

    .modal-overlay.open {
      opacity: 1;
      pointer-events: all;
    }

    .modal-backdrop {
      position: absolute;
      inset: 0;
      background: rgba(var(--text), 0.4);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
    }

    .modal-box {
      position: relative;
      z-index: 1;
      background: var(--surface-solid);
      border-radius: var(--radius-lg);
      width: 100%;
      max-width: 420px;
      max-height: 85vh;
      overflow-y: auto;
      box-shadow: var(--shadow-lg);
      display: flex;
      flex-direction: column;
      transform: scale(.9) translateY(20px);
      transition: transform .4s var(--spring);
      border: 1px solid var(--border-glass);
      scrollbar-width: none;
    }

    .modal-box::-webkit-scrollbar {
      display: none;
    }

    .modal-overlay.open .modal-box {
      transform: scale(1) translateY(0);
    }

    .modal-img-wrap img {
      width: 100%;
      aspect-ratio: 1/1;
      object-fit: contain;
      background: var(--surface-2);
      border-radius: var(--radius-lg) var(--radius-lg) 0 0;
    }

    .modal-close {
      position: absolute;
      top: 16px;
      right: 16px;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: rgba(var(--surface-solid), 0.85);
      backdrop-filter: blur(8px);
      border: 1px solid var(--border);
      font-size: 1.4rem;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      z-index: 10;
      color: var(--text);
      transition: all .3s var(--spring);
    }

    .modal-close:hover {
      transform: scale(1.1);
      background: var(--surface-solid);
    }

    .modal-body {
      padding: 2rem;
    }

    .modal-cat {
      display: inline-block;
      padding: 6px 14px;
      background: rgba(var(--accent), 0.12);
      border-radius: var(--radius-pill);
      font-size: .75rem;
      font-weight: 800;
      color: var(--accent);
      margin-bottom: 1rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .modal-title {
      font-family: 'Poppins', sans-serif;
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--text);
      line-height: 1.4;
      margin-bottom: 1rem;
    }

    .modal-price {
      font-size: 2rem;
      font-weight: 800;
      color: var(--text);
      margin-bottom: 2rem;
      display: inline-block;
      padding: 12px 24px;
      background: var(--surface-2);
      border-radius: var(--radius-md);
      border: 1px solid var(--border);
      letter-spacing: -1px;
    }

    .btn-modal-buy {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      padding: 18px;
      background: var(--accent-grad);
      color: #fff;
      text-decoration: none;
      font-size: 1rem;
      font-weight: 800;
      border-radius: var(--radius-sm);
      box-shadow: var(--shadow-acc);
      transition: transform .2s;
    }

    .btn-modal-buy:hover {
      transform: translateY(-3px);
      box-shadow: 0 16px 32px rgba(var(--accent), 0.3);
    }

    /* ── SKELETON ── */
    .skel {
      background: var(--surface);
      backdrop-filter: blur(10px);
      border-radius: var(--radius-md);
      padding: 10px;
      border: 1px solid var(--border-glass);
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .skel::after {
      content: '';
      position: absolute;
      inset: 0;
      transform: translateX(-100%);
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.4), transparent);
      animation: premiumShimmer 1.5s infinite linear;
    }

    [data-theme="dark"] .skel::after {
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.05), transparent);
    }

    .skel-img {
      aspect-ratio: 1/1;
      border-radius: var(--radius-sm);
      background: var(--surface-2);
      animation: premiumPulse 1.8s infinite ease-in-out;
    }

    .skel-line {
      height: 14px;
      border-radius: var(--radius-pill);
      background: var(--surface-2);
      animation: premiumPulse 1.8s infinite ease-in-out;
    }

    .skel-line.title {
      width: 85%;
    }

    .skel-line.price {
      width: 45%;
      height: 20px;
    }

    .skel-line.button {
      height: 46px;
      border-radius: var(--radius-sm);
      margin-top: auto;
    }

    @keyframes premiumShimmer {
      100% {
        transform: translateX(100%);
      }
    }

    @keyframes premiumPulse {

      0%,
      100% {
        opacity: 0.6;
      }

      50% {
        opacity: 1;
      }
    }

    .state-box {
      grid-column: 1 / -1;
      text-align: center;
      padding: 6rem 1rem;
    }

    .state-box .ico {
      font-size: 3.5rem;
      margin-bottom: 1rem;
    }

    .state-box h3 {
      font-family: 'Poppins', sans-serif;
      font-size: 1.4rem;
      color: var(--text);
      margin-bottom: .5rem;
    }
  </style>
</head>

<body>

  <header class="site-header">
    <div class="header-inner">
      <a class="logo" href="#" onclick="switchTab('home'); return false;">
        <img src="./src/logo.webp" alt="Logo" class="logo-img" onerror="this.style.display='none'">
        <span class="logo-text">Achadinhos <em>Diários</em></span>
      </a>
      <button class="theme-toggle" onclick="toggleTheme()" title="Alternar Modo Escuro">
        <span>☀️</span>
      </button>
    </div>
  </header>

  <main>
    <section id="view-home" class="tab-view active">
      <div class="hero-panel">
        <div class="capsule-text-wrap">
          <h1>Sua curadoria de <br><span>achados imperdíveis</span></h1>
          <p>As melhores ofertas selecionadas diariamente para você. Explore os cards abaixo para descobrir!</p>
        </div>
      </div>
    </section>

    <section id="view-explorer" class="tab-view">
      <div class="explorer-header">
        <div class="filter-scroll-wrap">
          <div class="filter-bar" id="filterBar">
            <button class="pill active" data-cat="todos" onclick="setCat('todos')">✨ Explorar Tudo</button>
          </div>
        </div>
        <div class="sort-container">
          <span class="sort-label">Ordenar ofertas por</span>
          <div class="sort-chips" id="sortChips">
            <button class="sort-chip active" data-sort="recente" onclick="setSort('recente')">🕐 Recentes</button>
            <button class="sort-chip" data-sort="preco-asc" onclick="setSort('preco-asc')">↓ Menor Preço</button>
            <button class="sort-chip" data-sort="preco-desc" onclick="setSort('preco-desc')">↑ Maior Preço</button>
            <button class="sort-chip" data-sort="az" onclick="setSort('az')">Ordem Alfabética</button>
          </div>
        </div>
      </div>
    </section>

    <section id="view-search" class="tab-view">
      <div class="search-hero">
        <div class="search-wrapper">
          <span class="search-icon">🔍</span>
          <input type="search" id="searchInput" placeholder="Digite o nome do produto..." autocomplete="off"
            oninput="onSearchInput()">
          <button class="search-clear" id="searchClear" onclick="clearSearch()">✕</button>
        </div>
        <div class="search-results-info">Atualmente, mostramos <span><b id="countNum">—</b> achadinhos</span></div>
      </div>
    </section>

    <section class="grid-section">
      <div class="product-grid" id="grid"></div>
    </section>

    <footer>
      <div class="footer-inner">
        <div class="footer-logo">
          <img src="./src/logo.webp" alt="Logo" onerror="this.style.display='none'">
          Achadinhos Diários
        </div>
        <div>
          <a href="https://linktr.ee/achadinh0s.sh0pee" target="_blank" rel="noopener noreferrer" class="btn-social">
            Nossas Redes 📱
          </a>
        </div>
        <div class="footer-copy">© 2026 Todos os direitos reservados.</div>
      </div>
    </footer>
  </main>

  <nav class="bottom-nav" id="bottomNav" role="tablist">
    <div class="nav-indicator" id="navIndicator"></div>

    <button class="nav-item active" data-tab="home" onclick="switchTab('home')" role="tab">
      <span class="icon">🏠</span>
      <span>Início</span>
    </button>
    <button class="nav-item" data-tab="explorer" onclick="switchTab('explorer')" role="tab">
      <span class="icon">🧭</span>
      <span>Explorar</span>
    </button>
    <button class="nav-item" data-tab="search" onclick="switchTab('search')" role="tab">
      <span class="icon">🔍</span>
      <span>Buscar</span>
    </button>
  </nav>

  <div id="modal" class="modal-overlay">
    <div class="modal-backdrop" onclick="closeModal()"></div>
    <div class="modal-box">
      <button class="modal-close" onclick="closeModal()">×</button>
      <div class="modal-img-wrap">
        <img id="modalImg" src="" alt="Produto">
      </div>
      <div class="modal-body">
        <span id="modalCat" class="modal-cat"></span>
        <h2 id="modalTitle" class="modal-title"></h2>
        <div id="modalPrice" class="modal-price"></div>
        <a id="modalLink" class="btn-modal-buy" href="#" target="_blank" rel="noopener noreferrer">Comprar Agora 🛒</a>
      </div>
    </div>
  </div>

  <script>
    (function () {
      const saved = localStorage.getItem('theme');
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      if (saved === 'dark' || (!saved && prefersDark)) {
        document.documentElement.setAttribute('data-theme', 'dark');
      }
    })();

    function toggleTheme() {
      const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
      document.documentElement.setAttribute('data-theme', isDark ? 'light' : 'dark');
      localStorage.setItem('theme', isDark ? 'light' : 'dark');
    }

    let currentTab = 'home';
    const tabOrder = ['home', 'explorer', 'search'];

    function updateNavIndicator(activeBtn) {
      const indicator = document.getElementById('navIndicator');
      if (!indicator || !activeBtn) return;
      indicator.style.width = activeBtn.offsetWidth + 'px';
      indicator.style.transform = `translateX(${activeBtn.offsetLeft}px)`;
    }

    window.addEventListener('load', () => {
      const activeBtn = document.querySelector('.nav-item.active');
      if (activeBtn) setTimeout(() => updateNavIndicator(activeBtn), 50);
    });
    window.addEventListener('resize', () => {
      const activeBtn = document.querySelector('.nav-item.active');
      if (activeBtn) updateNavIndicator(activeBtn);
    });

    function switchTab(viewName) {
      if (viewName === currentTab) return;

      const prevIndex = tabOrder.indexOf(currentTab);
      const nextIndex = tabOrder.indexOf(viewName);
      const directionClass = nextIndex > prevIndex ? 'slide-right' : 'slide-left';

      document.body.setAttribute('data-view', viewName);
      currentTab = viewName;

      document.querySelectorAll('.nav-item').forEach(btn => {
        const isActive = btn.dataset.tab === viewName;
        btn.classList.toggle('active', isActive);
        if (isActive) updateNavIndicator(btn);
      });

      document.querySelectorAll('.tab-view').forEach(view => {
        view.classList.remove('active', 'slide-right', 'slide-left');
      });

      const activeView = document.getElementById(`view-${viewName}`);
      if (activeView) {
        void activeView.offsetWidth;
        activeView.classList.add('active', directionClass);
      }

      if (viewName === 'search') {
        setTimeout(() => document.getElementById('searchInput').focus(), 300);
      }
      if (viewName === 'home') {
        catAtual = 'todos';
        document.getElementById('searchInput').value = '';
        document.getElementById('searchClear').classList.remove('visible');
        document.querySelectorAll('.pill').forEach(b => b.classList.toggle('active', b.dataset.cat === 'todos'));
        aplicarFiltros();
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }
    }

    const API_URL = "https://script.google.com/macros/s/AKfycbwO7BQje-TFZ1IXTwAk69PR8kAe74hHb2KV4jY-iNLAUzv-cAbDO0aHiItO9goLMENnfw/exec";
    const API_KEY = "netinho2007";

    let db = [], visible = [], catAtual = 'todos', sortAtual = 'recente';

    window.addEventListener('load', carregar);
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

    async function carregar() {
      renderSkeleton();
      try {
        const res = await fetch(`${API_URL}?action=listar&key=${API_KEY}`);
        const data = await res.json();
        const raw = Array.isArray(data) ? data : (data.produtos || data.data || []);
        db = raw.map(normalizar).filter(p => p.status === 'feito');
        montarFiltros();
        aplicarFiltros();
      } catch (e) {
        document.getElementById('grid').innerHTML = `
          <div class="state-box">
            <div class="ico">💔</div>
            <h3>Ops, algo deu errado</h3>
            <p>Não foi possível conectar ao banco de achadinhos. Tente recarregar a página.</p>
          </div>`;
        console.error(e);
      }
    }

    function normalizar(p) {
      const sem = s => String(s).normalize('NFD').replace(/[\u0300-\u036f]/g, '').toLowerCase().trim();
      const flat = {};
      Object.keys(p).forEach(k => { flat[sem(k)] = p[k]; });
      const lk = (canonical, fb = '') => {
        const v = p[canonical]; if (v != null && v !== '') return v;
        const v2 = flat[sem(canonical)]; if (v2 != null && v2 !== '') return v2;
        return fb;
      };
      return {
        titulo: lk('Título') || lk('Titulo'),
        preco: lk('Preço') || lk('Preco'),
        imagem: lk('Imagem'),
        link: lk('Link'),
        categoria: String(lk('Categoria') || '').trim(),
        status: String(lk('Status') || 'pendente').toLowerCase().trim(),
      };
    }

    function onSearchInput() {
      const val = document.getElementById('searchInput').value;
      document.getElementById('searchClear').classList.toggle('visible', val.length > 0);
      aplicarFiltros();
    }

    function clearSearch() {
      document.getElementById('searchInput').value = '';
      document.getElementById('searchClear').classList.remove('visible');
      document.getElementById('searchInput').focus();
      aplicarFiltros();
    }

    function setSort(val) {
      sortAtual = val;
      document.querySelectorAll('.sort-chip').forEach(b => b.classList.toggle('active', b.dataset.sort === val));
      aplicarFiltros();
    }

    function setCat(cat) {
      catAtual = cat;
      document.querySelectorAll('.pill').forEach(b => b.classList.toggle('active', b.dataset.cat === cat));
      aplicarFiltros();
    }

    function montarFiltros() {
      const cats = [...new Set(db.map(p => p.categoria).filter(Boolean))].sort();
      const bar = document.getElementById('filterBar');
      while (bar.children.length > 1) bar.removeChild(bar.lastChild);
      cats.forEach(cat => {
        const btn = document.createElement('button');
        btn.className = 'pill';
        btn.dataset.cat = cat;
        btn.textContent = cat;
        btn.onclick = () => setCat(cat);
        bar.appendChild(btn);
      });
    }

    function normalizeStr(s) {
      return String(s || '').normalize('NFD').replace(/[\u0300-\u036f]/g, '').toLowerCase().trim();
    }

    function aplicarFiltros() {
      let lista = [...db];

      if (catAtual !== 'todos') {
        lista = lista.filter(p => p.categoria === catAtual);
      }

      const raw = document.getElementById('searchInput').value;
      const q = normalizeStr(raw);
      if (q) {
        lista = lista.filter(p => normalizeStr(p.titulo).includes(q));
      }

      lista = ordenar(lista, sortAtual);
      visible = lista;
      document.getElementById('countNum').textContent = lista.length;
      renderGrid(lista);
    }

    function ordenar(lista, c) {
      const a = [...lista];
      if (c === 'preco-asc') return a.sort((x, y) => pNum(x) - pNum(y));
      if (c === 'preco-desc') return a.sort((x, y) => pNum(y) - pNum(x));
      if (c === 'az') return a.sort((x, y) => (x.titulo || '').localeCompare(y.titulo || ''));
      return a;
    }

    function renderSkeleton() {
      document.getElementById('grid').innerHTML = Array(6).fill(0).map(() => `
        <div class="skel">
          <div class="skel-img"></div>
          <div class="skel-line title"></div>
          <div class="skel-line price"></div>
          <div class="skel-line button"></div>
        </div>`).join('');
    }

    function renderGrid(lista) {
      const grid = document.getElementById('grid');
      if (!lista.length) {
        grid.innerHTML = `
          <div class="state-box">
            <div class="ico">🧐</div>
            <h3>Nada encontrado</h3>
            <p style="color:var(--text-muted)">Tente ajustar os filtros ou pesquisar por outro nome.</p>
          </div>`;
        return;
      }
      grid.innerHTML = lista.map((p, i) => cardHtml(p, i)).join('');
    }

    function cardHtml(p, i) {
      const img = p.imagem || 'https://placehold.co/400x400/F7F2E9/D48D5E?text=Sem+Imagem';
      const title = esc(p.titulo || 'Produto Incrível');
      const preco = fmt(p.preco);
      const cat = esc(p.categoria);
      const link = p.link || '#';
      const delay = Math.min(i * 20, 200);

      return `
        <article class="card" style="animation: smoothSlideRight 0.6s var(--spring) both; animation-delay:${delay}ms" onclick="openModal(${i})">
          <div class="card-img">
            <img src="${img}" alt="${title}" loading="lazy" onerror="this.src='https://placehold.co/400x400/F7F2E9/D48D5E?text=Indisponível'">
            ${cat ? `<span class="cat-tag">${cat}</span>` : ''}
            <div class="img-hint"><span>🔍 Ver detalhes</span></div>
          </div>
          <div class="card-body">
            <div class="card-title" title="${title}">${title}</div>
            <div class="card-price">${preco}</div>
            <a class="btn-buy" href="${link}" target="_blank" rel="noopener noreferrer" onclick="event.stopPropagation()">
              Eu Quero! 🛒
            </a>
          </div>
        </article>`;
    }

    function openModal(i) {
      const p = visible[i]; if (!p) return;
      document.getElementById('modalImg').src = p.imagem || 'https://placehold.co/400x400/F7F2E9/D48D5E?text=Sem+Imagem';

      const cat = document.getElementById('modalCat');
      cat.textContent = p.categoria || '';
      cat.style.display = p.categoria ? 'inline-block' : 'none';

      document.getElementById('modalTitle').textContent = p.titulo || 'Produto sem título';
      document.getElementById('modalPrice').textContent = fmt(p.preco);
      document.getElementById('modalLink').href = p.link || '#';
      document.getElementById('modal').classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closeModal() {
      document.getElementById('modal').classList.remove('open');
      document.body.style.overflow = '';
    }

    function pNum(p) {
      if (!p.preco) return 0;
      let s = String(p.preco).replace('R$', '').trim();
      if (s.includes(',')) s = s.replace(/\./g, '').replace(',', '.');
      const n = parseFloat(s);
      return isNaN(n) ? 0 : n;
    }

    function fmt(v) {
      if (!v) return 'R$ 0,00';
      if (String(v).includes('R$')) return v;
      return pNum({ preco: v }).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
    }

    function esc(s) {
      if (!s) return '';
      const d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }
  </script>
</body>

</html>
